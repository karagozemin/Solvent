# Continuous integration: runs the adversarial contract test suite on every
# push / PR. This is the "8/8, real BN254 pairing, zero mocks" suite the README
# describes — it proves the attack rejections keep passing on clean CI runners.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: {}

jobs:
  contract-tests:
    name: mint_guard adversarial suite (8/8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Soroban SDK 26.x requires the wasm32v1-none target (Rust 1.84+),
          # not the legacy wasm32-unknown-unknown.
          targets: wasm32v1-none


      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Run adversarial test suite (real pairing, no mocks)
        run: cargo test -p mint_guard -- --nocapture

      - name: Build reproducible release WASM (sanity)
        run: cargo build -p mint_guard --release --target wasm32v1-none

